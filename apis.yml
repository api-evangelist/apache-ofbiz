aid: apache-ofbiz
name: Apache OFBiz
description: >-
  Apache OFBiz is an open-source enterprise resource planning (ERP) system providing a suite
  of integrated business applications for CRM, e-commerce, supply chain management,
  manufacturing, accounting, order management, inventory, and warehousing. Built on a
  service-oriented architecture with a service engine, entity engine, and widget framework,
  OFBiz exposes a REST API plugin allowing any exported service to be invoked via JWT-
  authenticated HTTP endpoints. Governed by the Apache Software Foundation under the
  Apache License 2.0. Written in Java with Groovy scripting support.
