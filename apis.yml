apis:
  - aid: apache-ofbiz:apache-ofbiz-rest-api
    name: Apache OFBiz REST API
    description: >-
      REST API plugin for Apache OFBiz that exposes any exported OFBiz service as a
      RESTful endpoint. Clients authenticate via HTTP Basic Auth to obtain a JWT token,
      then invoke services via GET (with URL-encoded JSON parameters) or POST (with JSON
      request body). Swagger UI is available at /docs/swagger-ui.html when the plugin is
      installed.
    humanURL: https://github.com/apache/ofbiz-plugins/tree/trunk/rest-api
    baseURL: https://localhost:8443/rest
    tags:
      - REST
      - JWT
      - Service Engine
      - ERP
    properties:
      - type: Documentation
        url: https://github.com/apache/ofbiz-plugins/blob/trunk/rest-api/src/docs/asciidoc/rest-api.adoc
